<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto | Atención al Cliente</title>

    <meta
        name="description"
        content="Contacta con Productos Innovadores para consultas, información y pedidos online.">

    <link rel="canonical" href="https://www.productosinnovadores.com/contacto.html">

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <a class="skip-link" href="#contenido">
        Saltar al contenido principal
    </a>

    <header>

        <h1>Atención al Cliente</h1>

        <nav aria-label="Menú principal">

    <ul>

        <li>
            <a href="index.html">Inicio</a>
        </li>

        <li>
            <a href="productos.html">Productos</a>
        </li>

        <li>
            <a href="contacto.html">Contacto</a>
        </li>

        <li>
            <a href="privacidad.html">Privacidad</a>
        </li>

    </ul>

</nav>

    </header>

    <main id="contenido">

        <h2>Formulario de contacto</h2>

        <form action="#" method="post">

            <label for="nombre">Nombre</label>
            <input
                type="text"
                id="nombre"
                name="nombre"
                autocomplete="name"
                required>

            <label for="email">Correo electrónico</label>
            <input
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                required>

            <label for="mensaje">Mensaje</label>
            <textarea
                id="mensaje"
                name="mensaje"
                rows="5"
                required></textarea>

            <div class="form-check">

                <input
                    type="checkbox"
                    id="privacidad"
                    name="privacidad"
                    required>

                <label for="privacidad">
                    He leído y acepto la
                    <a href="privacidad.html">Política de Privacidad</a>.
                </label>

            </div>

            <button type="submit">
                Enviar
            </button>

        </form>

    </main>

    <footer>

        <p>&copy; 2026 Productos Innovadores. Todos los derechos reservados.</p>

    </footer>

</body>

</html>
